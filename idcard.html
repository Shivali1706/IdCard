<!DOCTYPE html>
<html>
<head>
    <title>College ID Card</title>
    <style>
        #box {
            width: 250px;
            padding: 20px;
            margin: 20px;
            border: 2px solid black;
            color: white; 
            font-family: 'Times New Roman', Times, serif;
            text-align: left;

            /* Background image */
            background-image: url('stu.jpg');
            background-size: cover;        /* Fill entire box */
            background-position: center;   /* Center the image */
            background-repeat: no-repeat;  /* Prevent repeating */
        }

        .btn{
            background-color: rgb(37, 198, 198);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover{
            background-color: peru;
        }
    </style>
</head>
<body>

    <div id="box">
        <h1><button class="btn">Student Card</button></h1>
        <p class="name"><label>Name:</label> Poppy</p>
        <p class="course"><label>Course:</label> 3rd sem</p>
        <p class="USN"><label>USN:</label> 1xxxxxxxxx</p> 
        <p class="Institute"><label>Institute:</label> Don Bosco Institute Of Technology</p>
        <p class="location"><label>Location:</label> Kumbalgodu Bangalore</p>
    </div>

</body>
</html>
